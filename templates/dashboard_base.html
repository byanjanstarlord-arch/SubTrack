{% extends 'base.html' %}

{% block body %}
<div class="min-h-screen flex bg-gray-50" x-data="{ sidebarOpen: false }">
    <!-- Mobile Sidebar Overlay -->
    <div x-show="sidebarOpen" 
         x-transition:enter="transition-opacity ease-linear duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-linear duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-40 bg-black/50 lg:hidden"
         @click="sidebarOpen = false"></div>
    
    <!-- Sidebar -->
    <aside class="fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-[#1F1F1F] text-white flex flex-col transition-transform duration-300 lg:translate-x-0"
           :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
        
        <!-- Logo -->
        <div class="p-6 flex items-center space-x-3">
            <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
                <i data-lucide="layers" class="w-4 h-4 text-[#1F1F1F]"></i>
            </div>
            <span class="text-lg font-bold">SubTrack</span>
        </div>
        
        <!-- Navigation -->
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
            <a href="{% url 'dashboard:index' %}" 
               class="sidebar-item {% if request.resolver_match.url_name == 'index' and request.resolver_match.app_name == 'dashboard' %}active{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Dashboard</span>
            </a>
            
            <a href="{% url 'subscriptions:list' %}" 
               class="sidebar-item {% if request.resolver_match.app_name == 'subscriptions' %}active{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
                <span>Subscriptions</span>
            </a>
            
            <a href="{% url 'subscriptions:renewals' %}" 
               class="sidebar-item {% if request.resolver_match.url_name == 'renewals' %}active{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white">
                <i data-lucide="calendar-clock" class="w-5 h-5"></i>
                <span>Renewals</span>
            </a>
            
            <a href="{% url 'analytics:overview' %}" 
               class="sidebar-item {% if request.resolver_match.app_name == 'analytics' %}active{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                <span>Analytics</span>
            </a>
            
            <a href="{% url 'gmail_detection:dashboard' %}" 
               class="sidebar-item {% if request.resolver_match.app_name == 'gmail_detection' %}active{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white">
                <i data-lucide="mail" class="w-5 h-5"></i>
                <span>Email Detection</span>
            </a>
            
            <a href="{% url 'reports:overview' %}" 
               class="sidebar-item {% if request.resolver_match.app_name == 'reports' %}active{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white">
                <i data-lucide="file-text" class="w-5 h-5"></i>
                <span>Reports</span>
            </a>
            
            <a href="{% url 'accounts:settings' %}" 
               class="sidebar-item {% if request.resolver_match.url_name == 'settings' %}active{% endif %} flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>Settings</span>
            </a>
        </nav>
        
        <!-- Go Premium Card -->
        <div class="p-4 mt-auto">
            <div class="bg-gradient-to-br from-gray-700 to-gray-800 rounded-2xl p-5">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
                        <i data-lucide="crown" class="w-5 h-5 text-amber-400"></i>
                    </div>
                </div>
                <h4 class="text-sm font-semibold mb-1">Go Premium</h4>
                <p class="text-xs text-gray-400 mb-4 leading-relaxed">Unlock advanced insights, email detection & more.</p>
                <button class="w-full py-2.5 bg-white text-[#1F1F1F] text-xs font-semibold rounded-xl hover:bg-gray-100 transition-colors">
                    Upgrade Now
                </button>
            </div>
        </div>
    </aside>
    
    <!-- Main Content -->
    <div class="flex-1 min-w-0">
        <!-- Top Navigation Bar -->
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100">
            <div class="flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
                <div class="flex items-center">
                    <!-- Mobile menu button -->
                    <button @click="sidebarOpen = !sidebarOpen" 
                            class="lg:hidden mr-4 p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    
                    <!-- Search -->
                    <div class="hidden sm:flex items-center bg-gray-100 rounded-xl px-4 py-2 w-72">
                        <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2"></i>
                        <input type="text" placeholder="Search anything..." 
                               class="bg-transparent text-sm text-gray-700 placeholder-gray-400 outline-none w-full">
                    </div>
                </div>
                
                <!-- Right side -->
                <div class="flex items-center space-x-4">
                    <!-- Notifications -->
                    <a href="{% url 'notifications:list' %}" class="relative p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition-colors">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </a>
                    
                    <!-- User Dropdown -->
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" 
                                class="flex items-center space-x-2 p-1.5 rounded-xl hover:bg-gray-100 transition-colors">
                            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-sm font-semibold text-blue-600">
                                {{ request.user.first_name|default:request.user.username|first|upper }}
                            </div>
                            <span class="hidden sm:block text-sm font-medium text-gray-700">{{ request.user.first_name|default:request.user.username }}</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                        </button>
                        
                        <!-- Dropdown -->
                        <div x-show="open" 
                             @click.away="open = false"
                             x-transition:enter="transition ease-out duration-100"
                             x-transition:enter-start="transform opacity-0 scale-95"
                             x-transition:enter-end="transform opacity-100 scale-100"
                             x-transition:leave="transition ease-in duration-75"
                             x-transition:leave-start="transform opacity-100 scale-100"
                             x-transition:leave-end="transform opacity-0 scale-95"
                             class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-premium border border-gray-100 py-2 z-50">
                            <a href="{% url 'accounts:profile' %}" class="flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                                <i data-lucide="user" class="w-4 h-4 mr-3"></i>
                                Profile
                            </a>
                            <a href="{% url 'accounts:settings' %}" class="flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                                <i data-lucide="settings" class="w-4 h-4 mr-3"></i>
                                Settings
                            </a>
                            <div class="border-t border-gray-100 my-1"></div>
                            <a href="{% url 'accounts:logout' %}" class="flex items-center px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors">
                                <i data-lucide="log-out" class="w-4 h-4 mr-3"></i>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-4 sm:p-6 lg:p-8">
            {% block dashboard_content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Alpine.js for interactions -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
{% endblock %}
