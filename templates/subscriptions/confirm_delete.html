{% extends 'dashboard_base.html' %}

{% block title %}Delete Subscription{% endblock %}

{% block dashboard_content %}
<div class="max-w-lg mx-auto mt-12">
    <div class="bg-white rounded-2xl shadow-soft border border-gray-50 p-8 text-center">
        <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <i data-lucide="trash-2" class="w-8 h-8 text-red-600"></i>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Delete Subscription</h1>
        <p class="text-gray-500 mb-2">Are you sure you want to delete <strong class="text-gray-900">{{ subscription.name }}</strong>?</p>
        <p class="text-sm text-red-500 mb-8">This action cannot be undone.</p>
        
        <form method="post" class="flex flex-col sm:flex-row items-center justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'subscriptions:list' %}" class="w-full sm:w-auto px-6 py-3 text-sm font-medium text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors text-center">
                Cancel
            </a>
            <button type="submit" class="w-full sm:w-auto px-6 py-3 text-sm font-medium text-white bg-red-600 rounded-xl hover:bg-red-700 transition-colors">
                Delete Subscription
            </button>
        </form>
    </div>
</div>
{% endblock %}
